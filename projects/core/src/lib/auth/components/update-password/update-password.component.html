    <mat-card class="update-card">
    <div class="welcome-text">Change Password</div>
    <p class="instruction-text">Update your existing password used to login into this account </p>
    <form [formGroup]="updatePasswordForm">
            <div class="form-field">
              <div class="form-field">
              <mat-label class="mat-body-2">Current Password</mat-label>
              <mat-form-field floatLabel="always">
                <input matInput [type]="hideCurrent  ? 'password' : 'text'" formControlName="currentPassword" placeholder="Enter your current Password" id="currentPassword">
                <mat-icon matSuffix class="isax {{hideCurrent  ? 'isax-eye' : 'isax-eye-slash'}}" (click)="hideCurrent = !hideCurrent"></mat-icon>
                <mat-error *ngIf="currentPassword.invalid && currentPassword.touched">
                  {{ getErrorText(currentPassword) }}
                </mat-error>
              </mat-form-field>
            </div>
              <mat-label class="mat-body-2">New Password</mat-label>
              <mat-form-field floatLabel="always">
                <input matInput [type]="hideNew  ? 'password' : 'text'" formControlName="newPassword" placeholder="Enter new password" id="newPassword">
                <mat-icon matSuffix class="isax {{hideNew  ? 'isax-eye' : 'isax-eye-slash'}}" (click)="hideNew = !hideNew"></mat-icon>
              </mat-form-field>
               <mat-error *ngIf="newPassword.invalid && newPassword.touched">
                {{ getErrorText(newPassword) }}
              </mat-error>
            </div>

            <div class="form-field">
              <mat-label class="mat-body-2">Confirm New Password</mat-label>
              <mat-form-field floatLabel="always">
                <input matInput [type]="hideConfirm  ? 'password' : 'text'" formControlName="confirmPassword" placeholder="Confirm your new password" id="confirmPassword">
                <mat-icon matSuffix class="isax {{hideConfirm  ? 'isax-eye' : 'isax-eye-slash'}}" (click)="hideConfirm = !hideConfirm"></mat-icon>
                <mat-error *ngIf="confirmPassword.touched && updatePasswordForm.hasError('passwordsMismatch')">
                  Passwords do not match
                </mat-error>
              </mat-form-field>
            </div>
            <button type="button"  mat-raised-button color="primary"  [disabled]="updatePasswordForm.invalid" (click)="updatePassword()">Update Password</button>

    </form>
    </mat-card>
<!-- </app-auth-layout> -->
