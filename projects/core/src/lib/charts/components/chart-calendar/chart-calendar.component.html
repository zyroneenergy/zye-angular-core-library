<div class="cc-panel" (click)="$event.stopPropagation()">
 
      <!-- Nav row -->
      <div class="cc-nav">
        <button class="cc-nav-btn" (click)="prevMonth()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <span class="cc-nav-title">{{ calTitle() }}</span>
        <button class="cc-nav-btn" (click)="nextMonth()" [disabled]="!canGoNext()" [class.disabled]="!canGoNext()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>
      </div>
 
      <!-- Phase hint -->
      <div class="cc-phase-hint">
        @if (phase() === 'start') {
          <span class="cc-phase-dot cc-phase-dot--start"></span> Select start date
        } @else {
          <span class="cc-phase-dot cc-phase-dot--end"></span> Select end date — max {{ maxDays }} days
        }
      </div>
 
      <!-- Weekday headers -->
      <div class="cc-weekdays">
        @for (d of weekdays; track d) { <span class="cc-weekday">{{ d }}</span> }
      </div>
 
      <!-- Day grid -->
      <div class="cc-grid">
        @for (cell of calDays(); track $index) {
          @if (cell === null) {
            <span class="cc-day cc-day--empty"></span>
          } @else {
            <button
              class="cc-day"
              [class.is-today]="cell.ds === todayStr"
              [class.is-start]="cell.ds === startStr()"
              [class.is-end]="cell.ds === endStr()"
              [class.in-range]="isInRange(cell.ds)"
              [class.is-disabled]="isDisabled(cell.ds)"
              [disabled]="isDisabled(cell.ds)"
              (click)="onDayClick(cell.ds)"
              (mouseenter)="onHover(cell.ds)">
              {{ cell.d }}
            </button>
          }
        }
      </div>
 
      <!-- Summary footer -->
      @if (startStr() && endStr()) {
        <div class="cc-footer">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          {{ rangeLabel() }}
        </div>
      }
 
    </div>
