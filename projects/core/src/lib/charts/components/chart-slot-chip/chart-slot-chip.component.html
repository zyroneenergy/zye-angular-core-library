<!-- ── FILLED chip ────────────────────────────────────────────── -->
    @if (label) {
      <button
        class="csc-chip csc-chip--filled"
        [class.open]="isOpen"
        [style.--slot-color]="color"
        [title]="label"
        (click)="chipClick.emit($event)">
 
        <span class="csc-dot"></span>
        <span class="csc-text">{{ label }}</span>
 
        <span class="csc-clear" title="Remove" (click)="onClear($event)">
          <svg width="8" height="8" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="3" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </span>
      </button>
    }
 
    <!-- ── EMPTY chip ─────────────────────────────────────────────── -->
    @if (!label) {
      <button
        class="csc-chip csc-chip--empty"
        [class.open]="isOpen"
        [title]="placeholder"
        (click)="chipClick.emit($event)">
 
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        <span>{{ placeholder }}</span>
      </button>
    }
