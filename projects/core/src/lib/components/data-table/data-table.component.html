<div class="sf-table-wrapper">

  <!-- ── Loading / Shimmer State ──────────────────────────────────────────── -->
  @if (loading) {
    <lib-shimmer preset="table-inline" [count]="10"></lib-shimmer>
  }

  <!-- ── Data Table ────────────────────────────────────────────────────────── -->
  @if (!loading) {
    <div class="sf-table-scroll">
      <table
        mat-table
        [dataSource]="dataSource"
        matSort
        [matSortActive]="sortActive"
        [matSortDirection]="sortDirection"
        (matSortChange)="onSortChange($event)"
        class="sf-table"
      >

        <!-- ── Checkbox column (optional) ─────────────────────────────────── -->
        @if (showCheckbox && selection) {
          <ng-container matColumnDef="select">
            <th mat-header-cell *matHeaderCellDef class="sf-cell-checkbox">
              <mat-checkbox
                [checked]="isAllSelected"
                [indeterminate]="isIndeterminate"
                (change)="onToggleAll()"
                aria-label="Select all rows"
              ></mat-checkbox>
            </th>
            <td mat-cell *matCellDef="let row" class="sf-cell-checkbox">
              <mat-checkbox
                [checked]="isSelected(row)"
                (click)="$event.stopPropagation()"
                (change)="onToggleRow(row)"
                [aria-label]="'Select row'"
              ></mat-checkbox>
            </td>
          </ng-container>
        }

        <!-- ── Dynamic columns ────────────────────────────────────────────── -->
        @for (col of columns; track col.key) {
          <ng-container [matColumnDef]="col.key">

            <!-- Header
                 Always provide a valid sort identifier to [mat-sort-header].
                 Use col.sortKey when available (for API field mapping),
                 otherwise fall back to col.key.
                 The [disabled] attribute controls whether sorting is enabled.
            -->
            <th
              mat-header-cell
              *matHeaderCellDef
              [mat-sort-header]="col.key"
              [disabled]="!col.sortable"
              [style.min-width]="col.minWidth ?? 'auto'"
            >
              {{ col.label }}
            </th>

            <!-- Cell -->
            <td mat-cell *matCellDef="let row">
              @if (templateMap.has(col.key)) {
                <ng-container
                  *ngTemplateOutlet="templateMap.get(col.key)!; context: { $implicit: row, row: row }"
                ></ng-container>
              } @else {
                {{ row[col.key] ?? '—' }}
              }
            </td>

          </ng-container>
        }

        <!-- ── Header & Row declarations ──────────────────────────────────── -->
        <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
        <tr
          mat-row
          *matRowDef="let row; columns: displayedColumns"
          (click)="onRowClick(row)"
          class="sf-data-row"
          [class.sf-row--dimmed]="isRowDimmed?.(row)"
        ></tr>

        <!-- ── Empty state ────────────────────────────────────────────────── -->
        <tr class="mat-row sf-no-data-row" *matNoDataRow>
          <td [attr.colspan]="displayedColumns.length" class="sf-no-data-cell">
            <div class="sf-empty-state">
              <mat-icon class="sf-empty-icon">{{ emptyIcon }}</mat-icon>
              <span class="sf-empty-title">{{ emptyTitle }}</span>
              <span class="sf-empty-desc">{{ emptyDescription }}</span>
            </div>
          </td>
        </tr>

      </table>
    </div>

    <!-- ── Paginator ──────────────────────────────────────────────────────── -->
    @if (totalItems > 0) {
      <mat-paginator
        class="sf-paginator"
        [length]="totalItems"
        [pageSize]="pageSize"
        [pageIndex]="pageIndex"
        [pageSizeOptions]="pageSizeOptions"
        (page)="onPageChange($event)"
        aria-label="Select page"
      ></mat-paginator>
    }
  }

</div>
