<div class="confirm-dialog" [class]="'confirm-dialog--' + config.type">

  <!-- Custom illustration -->
  <div class="confirm-dialog__icon-container" [innerHTML]="illustration"></div>

  <h2 mat-dialog-title class="confirm-dialog__title">{{ config.title }}</h2>

  <mat-dialog-content class="confirm-dialog__content">
    <p class="confirm-dialog__message">{{ config.message }}</p>
    <p *ngIf="config.detail" class="confirm-dialog__detail">{{ config.detail }}</p>

    <div *ngIf="config.warningNote" class="confirm-dialog__warning-note">
      <mat-icon>warning_amber</mat-icon>
      <span>{{ config.warningNote }}</span>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="center" class="confirm-dialog__actions">
    <button
      mat-stroked-button
      *ngIf="config.cancelText"
      class="confirm-dialog__cancel"
      [mat-dialog-close]="false"
      [disabled]="isLoading">
      {{ config.cancelText }}
    </button>

    <button
      mat-raised-button
      class="confirm-dialog__confirm"
      [class]="'confirm-btn--' + config.type"
      (click)="onConfirm()"
      [disabled]="isLoading">
      <mat-spinner *ngIf="isLoading" diameter="20" class="btn-spinner"></mat-spinner>
      <span *ngIf="!isLoading">{{ config.confirmText ?? 'Confirm' }}</span>
      <span *ngIf="isLoading">Processing...</span>
    </button>
  </mat-dialog-actions>
</div>
